{{- range $name, $svc := .Values.services }}
{{- $image := $svc.image | default $.Values.image }}
{{- if not $image }}
{{- fail (printf "services.%s.image is required (set it per-service or provide a top-level image default)" $name) }}
{{- end }}
{{- $fullname := include "app.fullname" (dict "root" $ "name" $name) }}
{{- $port := $svc.port | default 80 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "app.labels" (dict "root" $ "name" $name "image" $image) | nindent 4 }}
spec:
  replicas: {{ $svc.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "app.selectorLabels" (dict "root" $ "name" $name) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "app.selectorLabels" (dict "root" $ "name" $name) | nindent 8 }}
    spec:
      containers:
        - name: {{ $name }}
          image: {{ $image | quote }}
          ports:
            - name: http
              containerPort: {{ $port }}
              protocol: TCP
          {{- with $svc.env }}
          env:
            {{- range $key, $value := . }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- end }}
          {{- with $svc.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
