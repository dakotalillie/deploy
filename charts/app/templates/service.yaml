{{- range $name, $svc := .Values.services }}
{{- $image := $svc.image | default $.Values.image }}
{{- $fullname := include "app.fullname" (dict "root" $ "name" $name) }}
{{- $port := $svc.port | default 80 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}
  labels:
    {{- include "app.labels" (dict "root" $ "name" $name "image" $image) | nindent 4 }}
spec:
  type: {{ $svc.serviceType | default "ClusterIP" }}
  selector:
    {{- include "app.selectorLabels" (dict "root" $ "name" $name) | nindent 4 }}
  ports:
    - name: http
      port: {{ $svc.servicePort | default $port }}
      targetPort: http
      protocol: TCP
{{- end }}
