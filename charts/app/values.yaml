# Default values for the app chart.

# Default container image used by every service that does not set its own
# `image`, e.g. "nginx:1.27". Leave empty to require each service to specify one.
image: ""

# A map of services to deploy. Each entry creates one Deployment and one Service.
# The map key is used as the service name.
#
# Per-service options:
#   image:        container image, e.g. "nginx:1.27" (falls back to the top-level
#                 `image` above; required if that default is not set)
#   replicaCount: number of pod replicas (default 1)
#   port:         container port the app listens on (default 80)
#   servicePort:  port the Service exposes (defaults to `port`)
#   serviceType:  Kubernetes Service type (default ClusterIP)
#   env:          map of environment variables (optional)
#   resources:    pod resource requests/limits (optional)
#   preDeploy:    run a one-off command before each deploy (optional; see below)
#
# preDeploy runs a task to completion as an Argo CD PreSync hook: it executes and
# must succeed before the new manifests are applied, and a failure aborts the sync
# so nothing new is rolled out. It runs on every sync that changes the app.
# Successful runs are cleaned up automatically; failed runs are kept so you can
# still inspect their logs while debugging.
#   command:      container command to run, as a list (required)
#   args:         arguments for the command, as a list (optional)
#   image:        image to run the command in (defaults to the service's image)
#   env:          extra environment variables; merged over the service's `env`,
#                 taking precedence on conflicts (optional)
#   resources:    resource requests/limits for the hook (defaults to the
#                 service's `resources`)
#   backoffLimit: retries before the hook is considered failed (default 0)
#   ttlSecondsAfterFinished:
#                 seconds Kubernetes keeps a finished hook Job before deleting it;
#                 bounds how long retained failures pile up (default 259200, i.e.
#                 3 days). Set to null to keep failed Jobs indefinitely.
services: {}
